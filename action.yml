name: 'Wait on check'
author: 'matiasalbarello'
description: 'Pause a workflow until a job in another workflow completes. Zero-overhead TypeScript implementation — no Ruby or Docker setup required.'
inputs:
  allowed-conclusions:
    description: 'Array of allowed conclusions'
    required: false
    default: success,skipped
  ignore-checks:
    description: 'Array of ignore checks'
    required: false
    default: ''
  check-name:
    description: 'A name of a check that has to pass'
    required: false
    default: ''
  check-regexp:
    description: 'Filter checks to wait using Regexp'
    required: false
    default: ''
  ref:
    description: 'A git ref to be checked: branch/tag/commit sha'
    required: true
  repo-token:
    description: 'A GitHub token for the repo'
    required: false
    default: ''
  wait-interval:
    description: 'Seconds to wait between Checks API requests'
    required: false
    default: '10'
  api-endpoint:
    description: 'Github API Endpoint to use.'
    required: false
    default: ''
  running-workflow-name:
    description: 'Name of the workflow to be ignored (the one who is waiting for the rest)'
    required: false
    default: ''
  verbose:
    description: 'Print logs if true'
    required: false
    default: 'true'
  fail-on-no-checks:
    description: 'Fail the action if no checks match the filter (check-name or check-regexp). Set to false to succeed when no checks match.'
    required: false
    default: 'true'
  checks-discovery-timeout:
    description: 'Seconds to wait for matching checks to be discovered before failing. Useful when the target workflow has not yet registered its checks.'
    required: false
    default: '60'

runs:
  using: 'node20'
  main: 'dist/index.js'

branding:
  icon: 'check-circle'
  color: 'green'
